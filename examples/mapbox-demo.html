<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Power Lines — Netherlands</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <script src="https://cdn.jsdelivr.net/npm/mapbox-gl@3.0.1/dist/mapbox-gl.js"></script>
  <link href="https://cdn.jsdelivr.net/npm/mapbox-gl@3.0.1/dist/mapbox-gl.css" rel="stylesheet" />
  <style>
    body { margin: 0; padding: 0; }
    #map { position: absolute; top: 0; bottom: 0; width: 100%; }
    #info {
      position: absolute; top: 10px; left: 10px;
      background: rgba(0,0,0,0.8); color: #fff;
      padding: 10px 14px; border-radius: 6px;
      font: 13px/1.4 -apple-system, sans-serif;
      pointer-events: none; z-index: 1;
    }
  </style>
</head>
<body>
<div id="info">Power Lines — Netherlands (OSM)</div>
<div id="map"></div>
<script>
  mapboxgl.accessToken = 'YOUR_MAPBOX_TOKEN'; // Replace with your token

  const map = new mapboxgl.Map({
    container: 'map',
    style: 'mapbox://styles/mapbox/dark-v11',
    center: [5.3, 52.1],
    zoom: 7
  });

  map.on('load', () => {
    map.addSource('power-lines', {
      type: 'geojson',
      data: '../geojson/NL/power_lines_nl.geojson'
    });

    // Transmission lines (high voltage) — bright orange
    map.addLayer({
      id: 'power-transmission',
      type: 'line',
      source: 'power-lines',
      filter: ['==', ['get', 'power_type'], 'line'],
      paint: {
        'line-color': '#ff6b35',
        'line-width': ['interpolate', ['zoom'], 6, 0.5, 10, 2],
        'line-opacity': 0.85
      }
    });

    // Distribution lines (minor) — dim yellow
    map.addLayer({
      id: 'power-distribution',
      type: 'line',
      source: 'power-lines',
      filter: ['==', ['get', 'power_type'], 'minor_line'],
      paint: {
        'line-color': '#ffd23f',
        'line-width': 0.5,
        'line-opacity': 0.4
      }
    });

    // Hover popup
    const popup = new mapboxgl.Popup({ closeButton: false, closeOnClick: false });

    map.on('mousemove', 'power-transmission', (e) => {
      const f = e.features[0];
      const v = f.properties.voltage || 'unknown';
      const op = f.properties.operator || 'unknown';
      popup.setLngLat(e.lngLat).setHTML(
        `<b>${f.properties.name || 'Power line'}</b><br>Voltage: ${v} kV<br>Operator: ${op}`
      ).addTo(map);
    });
    map.on('mouseleave', 'power-transmission', () => popup.remove());
  });
</script>
</body>
</html>
